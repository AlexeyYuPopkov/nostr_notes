name: iOS TestFlight Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.7'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter iOS
        run: flutter build ios --release --no-codesign

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install Fastlane
        working-directory: ios
        run: |
          gem install bundler
          bundle install

      - name: Create API Key JSON
        working-directory: ios
        run: |
          echo '{
            "key_id": "${{ secrets.NOSTR_NOTES_APP_STORE_CONNECT_API_KEY_ID }}",
            "issuer_id": "${{ secrets.NOSTR_NOTES_APP_STORE_CONNECT_ISSUER_ID }}",
            "key": "${{ secrets.NOSTR_NOTES_APP_STORE_CONNECT_API_KEY_BASE64 }}",
            "in_house": false
          }' > fastlane/api_key.json

      - name: Deploy to TestFlight
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.NOSTR_NOTES_MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.NOSTR_NOTES_MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta

      - name: Clean up
        if: always()
        run: rm -f ios/fastlane/api_key.json
